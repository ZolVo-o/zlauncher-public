name: Deploy Site From Private Repo

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private source repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build site with downloadable files
        run: npm run build:site

      - name: Publish dist to public pages repo
        env:
          PAGES_REPO: ${{ secrets.PAGES_PUBLIC_REPO }}
          PAGES_TOKEN: ${{ secrets.PAGES_DEPLOY_PAT }}
        run: |
          if [ -z "$PAGES_REPO" ]; then
            echo "Missing secret PAGES_PUBLIC_REPO (format: owner/repo)"
            exit 1
          fi
          if [ -z "$PAGES_TOKEN" ]; then
            echo "Missing secret PAGES_DEPLOY_PAT"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${PAGES_TOKEN}@github.com/${PAGES_REPO}.git" public-pages
          rm -rf public-pages/*
          cp -r dist/* public-pages/
          touch public-pages/.nojekyll

          cd public-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy site from private repo: ${GITHUB_SHA}"
          git push origin HEAD:main
