name: Build And Publish Release Assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.0.0)"
        required: true
        default: "0.0.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run desktop:build

      - name: Rename artifacts
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Copy-Item "release\zollauncher Setup 0.0.0.exe" "release\zollauncher-Setup-$version.exe" -Force
          Copy-Item "release\win-unpacked\zollauncher.exe" "release\zollauncher-Portable-$version.exe" -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: zollauncher v${{ github.event.inputs.version }}
          make_latest: true
          files: |
            release/zollauncher-Setup-${{ github.event.inputs.version }}.exe
            release/zollauncher-Portable-${{ github.event.inputs.version }}.exe
